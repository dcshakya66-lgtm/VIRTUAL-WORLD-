<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Girl AI Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        #chat-container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }
        #messages {
            height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .message {
            margin: 10px 0;
        }
        .user {
            text-align: right;
            color: blue;
        }
        .bot {
            text-align: left;
            color: green;
        }
        #user-input {
            width: calc(100% - 100px);
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        #send-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        #send-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <h2>Anime Girl AI Chatbot</h2>
        <div id="messages"></div>
        <input type="text" id="user-input" placeholder="Type your message..." />
        <button id="send-btn">Send</button>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage() {
            const userMessage = userInput.value;
            if (!userMessage) return;

            displayMessage(userMessage, 'user');
            userInput.value = '';
            typingIndicator();

            // Simulate AI response
            setTimeout(() => {
                const botResponse = generateAIResponse(userMessage);
                displayMessage(botResponse, 'bot');
            }, 1000);
        }

        function displayMessage(message, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerHTML = message;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function typingIndicator() {
            const typingIndicatorDiv = document.createElement('div');
            typingIndicatorDiv.innerHTML = '<em>...typing</em>';
            messagesDiv.appendChild(typingIndicatorDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            setTimeout(() => {
                messagesDiv.removeChild(typingIndicatorDiv);
            }, 1000);
        }

        function generateAIResponse(userMessage) {
            // Simple AI Response Generation Logic with Emoji
            const responses = [
                '😊 Hello! How can I help you?',
                '🤖 I am here to assist you!',
                '🌟 What can I do for you today?',
                '💬 Let’s chat!'
            ];
            return responses[Math.floor(Math.random() * responses.length)];
        }
    </script>
</body>
</html>
